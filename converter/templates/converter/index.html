<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>File Converter</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;800&display=swap');

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0f0f0f;
            --surface: #1a1a1a;
            --border: #2e2e2e;
            --accent: #d4f04c;
            --text: #f0f0f0;
            --muted: #888;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Mono', monospace;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 3rem 2.5rem;
            width: 100%;
            max-width: 480px;
        }

        h1 {
            font-family: 'Syne', sans-serif;
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 0.4rem;
        }

        h1 span {
            color: var(--accent);
        }

        .subtitle {
            color: var(--muted);
            font-size: 0.8rem;
            margin-bottom: 2rem;
        }

        .drop-zone {
            border: 2px dashed var(--border);
            border-radius: 12px;
            padding: 2.5rem 1.5rem;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
            position: relative;
            margin-bottom: 1.5rem;
        }

        .drop-zone:hover,
        .drop-zone.dragover {
            border-color: var(--accent);
            background: rgba(212, 240, 76, 0.04);
        }

        .drop-zone input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
            width: 100%;
            height: 100%;
        }

        .drop-icon {
            font-size: 2.4rem;
            margin-bottom: 0.75rem;
        }

        .drop-label {
            font-size: 0.85rem;
            color: var(--muted);
            line-height: 1.6;
        }

        .drop-label strong {
            color: var(--text);
            display: block;
            margin-bottom: 0.2rem;
        }

        #file-name {
            margin-top: 0.6rem;
            font-size: 0.78rem;
            color: var(--accent);
            min-height: 1.2em;
        }

        .tags {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .tag {
            background: #222;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0.3rem 0.7rem;
            font-size: 0.72rem;
            color: var(--muted);
        }

        .tag span {
            color: var(--accent);
            margin-right: 0.3rem;
        }

        button[type="submit"] {
            width: 100%;
            background: var(--accent);
            color: #0f0f0f;
            border: none;
            border-radius: 10px;
            padding: 0.85rem;
            font-family: 'Syne', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            letter-spacing: 0.3px;
        }

        button[type="submit"]:hover {
            opacity: 0.88;
        }

        button[type="submit"]:active {
            transform: scale(0.98);
        }

        .error {
            margin-top: 1.2rem;
            background: rgba(255, 80, 80, 0.08);
            border: 1px solid rgba(255, 80, 80, 0.25);
            border-radius: 8px;
            padding: 0.75rem 1rem;
            font-size: 0.8rem;
            color: #ff6b6b;
        }

        .footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.72rem;
            color: #444;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>File<span>Convert</span></h1>
        <p class="subtitle">PDF ↔ DOCX — instant, free, no signup</p>

        <form method="post" action="/convert/" enctype="multipart/form-data">
            {% csrf_token %}

            <div class="drop-zone" id="drop-zone">
                <input type="file" name="file" id="file-input" accept=".pdf,.docx" required />
                <div class="drop-icon">📂</div>
                <div class="drop-label">
                    <strong>Drop your file here</strong>
                    or click to browse
                </div>
                <div id="file-name"></div>
            </div>

            <div class="tags">
                <div class="tag"><span>→</span> PDF to DOCX</div>
                <div class="tag"><span>→</span> DOCX to PDF</div>
            </div>

            <button type="submit">Convert & Download</button>
        </form>

        {% if error %}
        <div class="error">⚠ {{ error }}</div>
        {% endif %}

        <div class="footer">Files are not stored permanently.</div>
    </div>

    <script>
        const input = document.getElementById('file-input');
        const label = document.getElementById('file-name');
        const zone = document.getElementById('drop-zone');

        input.addEventListener('change', () => {
            label.textContent = input.files[0] ? input.files[0].name : '';
        });

        zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
        zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
        zone.addEventListener('drop', e => {
            e.preventDefault();
            zone.classList.remove('dragover');
            if (e.dataTransfer.files.length) {
                input.files = e.dataTransfer.files;
                label.textContent = input.files[0].name;
            }
        });
    </script>
</body>

</html>
